services:
  nginx:
    image: ${PROJECT_NAME:-myapp}_nginx:${IMAGE_TAG:-latest}
    build:
      context: ../../
      dockerfile: ./src/Nginx/Dockerfile
    container_name: "nginx"
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost${BASE_PATH:-/}"]
      interval: 10s
      timeout: 3s
      retries: 5
    environment:
      BASE_PATH: ${BASE_PATH:-/}
      DEFAULT_SERVICE: ${DEFAULT_SERVICE:-App}
    ports:
      - ${APP_NGINX_PORT:-10001}:80
    networks:
      - nginx

networks:
  nginx:
